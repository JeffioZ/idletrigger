changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "✨ Features / 新功能"
      labels:
        - enhancement
        - feature
    - title: "🐛 Fixes / 问题修复"
      labels:
        - bug
        - fix
    - title: "🎨 Interface & Experience / 界面与体验"
      labels:
        - ui
        - ux
    - title: "📚 Documentation / 文档"
      labels:
        - documentation
    - title: "🧰 Maintenance / 维护"
      labels:
        - dependencies
        - maintenance
        - refactor
    - title: "Other Changes / 其他变更"
      labels:
        - "*"
