name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'

      - name: Verify
        run: |
          go mod download
          go mod verify
          $unfmt = (gofmt -l .)
          if ($unfmt) { Write-Error "gofmt: $unfmt"; exit 1 }
          go test -count=1 ./...
          go vet ./...

      - name: Generate .syso
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          go run ./scripts/gen_resource.go -version $version

      - name: Build
        run: |
          $env:CGO_ENABLED = "0"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $ldflags = "-s -w -H windowsgui -X github.com/JeffioZ/idletrigger/internal/version.Value=$version"
          $env:GOARCH = "386"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x86.exe .
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x64.exe .

      - name: Checksums
        run: |
          $lines = @()
          foreach ($file in @("dist/IdleTrigger-x86.exe", "dist/IdleTrigger-x64.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            $lines += "$hash *$([System.IO.Path]::GetFileName($file))"
          }
          Set-Content -Encoding ascii SHA256SUMS.txt $lines

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          fail_on_unmatched_files: true
          files: |
            dist/IdleTrigger-x86.exe
            dist/IdleTrigger-x64.exe
            SHA256SUMS.txt
          body: |
            ## English

            ### Highlights

            - Hardened idle monitoring with diagnostics for Windows last-input resets and optional fixed-interval keepalive filtering.
            - Added `IdleTrigger diagnostics idle [--watch]` for inspecting idle timing and input-reset behavior.
            - Clarified Stay Awake process-watch semantics: watched processes now limit an enabled Stay Awake session instead of enabling it by themselves.
            - Improved native control-panel keyboard accessibility, tooltip state text, and idle-warning layout.
            - Reduced debug-log overhead when logging is disabled and expanded diagnostics around keepalive decisions.

            Download the native 64-bit build `IdleTrigger-x64.exe` (recommended) or
            the 32-bit compatibility build `IdleTrigger-x86.exe` — no installation needed.

            See [README.md](https://github.com/JeffioZ/idletrigger/blob/master/README.md) for full documentation.

            ## 中文

            ### 更新重点

            - 强化空闲监测，增加 Windows 最后输入重置诊断，并支持可选过滤固定间隔保活输入。
            - 新增 `IdleTrigger diagnostics idle [--watch]`，用于查看空闲计时与输入重置行为。
            - 明确保持唤醒的进程监听语义：指定进程只限制已开启的保持唤醒，不会单独启用保持唤醒。
            - 优化原生控制浮层的键盘可访问性、tooltip 状态说明和空闲预警布局。
            - 日志关闭时减少调试格式化开销，并补充保活输入判定诊断。

            下载原生 64 位版本 `IdleTrigger-x64.exe`（推荐），或下载 32 位兼容版本
            `IdleTrigger-x86.exe`。无需安装，直接运行即可。

            完整说明见 [README.zh-CN.md](https://github.com/JeffioZ/idletrigger/blob/master/README.zh-CN.md)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
