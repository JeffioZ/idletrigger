name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'

      - name: Verify
        run: |
          go mod download
          go mod verify
          $unfmt = (gofmt -l .)
          if ($unfmt) { Write-Error "gofmt: $unfmt"; exit 1 }
          go test -count=1 ./...
          go vet ./...

      - name: Generate .syso
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          go run ./scripts/gen_resource.go -version $version

      - name: Build
        run: |
          $env:CGO_ENABLED = "0"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $ldflags = "-s -w -H windowsgui -X github.com/JeffioZ/idletrigger/internal/version.Value=$version"
          $env:GOARCH = "386"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x86.exe .
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x64.exe .

      - name: Checksums
        run: |
          $lines = @()
          foreach ($file in @("dist/IdleTrigger-x86.exe", "dist/IdleTrigger-x64.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            $lines += "$hash *$([System.IO.Path]::GetFileName($file))"
          }
          Set-Content -Encoding ascii SHA256SUMS.txt $lines

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          fail_on_unmatched_files: true
          files: |
            dist/IdleTrigger-x86.exe
            dist/IdleTrigger-x64.exe
            SHA256SUMS.txt
          body: |
            ## English

            ### Highlights

            - Added IP-based sunrise/sunset location resolution with safe fallback through Windows timezone, UTC offset, and the default location.
            - Improved day/night theme fallback documentation and failure diagnostics.
            - Fixed CLI output behavior for Windows GUI-subsystem builds.
            - Aligned user-facing idle monitor and theme text in English and Simplified Chinese.
            - Hardened release, lint, repository hygiene, and config example consistency checks.

            Download the native 64-bit build `IdleTrigger-x64.exe` (recommended) or
            the 32-bit compatibility build `IdleTrigger-x86.exe` — no installation needed.

            See [README.md](https://github.com/JeffioZ/idletrigger/blob/master/README.md) for full documentation.

            ## 中文

            ### 更新重点

            - 新增基于 IP 的日出日落定位，并按 Windows 时区、UTC 偏移和默认位置安全回退。
            - 完善昼夜主题回退说明和主题切换失败诊断日志。
            - 修复 Windows GUI 子系统构建下 CLI 输出行为。
            - 对齐空闲监测与主题相关的中英文用户可见文案。
            - 强化发布、Lint、仓库清理和配置示例一致性检查。

            下载原生 64 位版本 `IdleTrigger-x64.exe`（推荐），或下载 32 位兼容版本
            `IdleTrigger-x86.exe`。无需安装，直接运行即可。

            完整说明见 [README.zh-CN.md](https://github.com/JeffioZ/idletrigger/blob/master/README.zh-CN.md)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
