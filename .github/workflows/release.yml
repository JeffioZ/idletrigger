name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'

      - name: Verify
        run: |
          go mod download
          go mod verify
          $unfmt = (gofmt -l .)
          if ($unfmt) { Write-Error "gofmt: $unfmt"; exit 1 }
          go test -count=1 ./...
          go vet ./...
          ./tools/check-build-boundaries.ps1

      - name: Generate .syso
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          go run ./tools/resourcegen.go -version $version

      - name: Build
        run: |
          $env:CGO_ENABLED = "0"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $ldflags = "-s -w -H windowsgui -X github.com/JeffioZ/idletrigger/internal/version.Value=$version"
          $env:GOARCH = "386"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x86.exe ./cmd/idletrigger
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x64.exe ./cmd/idletrigger

      - name: Checksums
        run: |
          $lines = @()
          foreach ($file in @("dist/IdleTrigger-x86.exe", "dist/IdleTrigger-x64.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            $lines += "$hash *$([System.IO.Path]::GetFileName($file))"
          }
          Set-Content -Encoding ascii SHA256SUMS.txt $lines

      - name: Create Draft Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            dist/IdleTrigger-x86.exe
            dist/IdleTrigger-x64.exe
            SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
