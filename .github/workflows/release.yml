name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Verify
        run: |
          go mod download
          go test ./...
          go vet ./...

      - name: Generate .syso
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          go run ./scripts/gen_resource.go -version $version

      - name: Build
        run: |
          $env:CGO_ENABLED = "0"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $ldflags = "-s -w -H windowsgui -X github.com/JeffioZ/idletrigger/internal/version.Value=$version"
          $env:GOARCH = "386"
          go build -trimpath -ldflags "$ldflags" -o IdleTrigger-x86.exe .
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "$ldflags" -o IdleTrigger-x64.exe .

      - name: Checksums
        run: |
          $lines = @()
          foreach ($file in @("IdleTrigger-x86.exe", "IdleTrigger-x64.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            $lines += "$hash *$file"
          }
          Set-Content -Encoding ascii SHA256SUMS.txt $lines

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            IdleTrigger-x86.exe
            IdleTrigger-x64.exe
            SHA256SUMS.txt
          body: |
            ## English

            ### Highlights

            - Refined the native tray control panel and idle-warning overlay for light/dark mode, DPI scaling, multilingual text, and multi-monitor positioning.
            - Made idle monitoring reset safely on startup, activity, warning cancellation, and completed actions.
            - Added an idle-action warning cancellation path and startup session IDs in debug logs.
            - Improved configuration annotation migration, tray status text, CLI parity, and English/Simplified Chinese documentation.

            Download the native 64-bit build `IdleTrigger-x64.exe` (recommended) or
            the 32-bit compatibility build `IdleTrigger-x86.exe` — no installation needed.

            See [README.md](https://github.com/JeffioZ/idletrigger/blob/master/README.md) for full documentation.

            ## 中文

            ### 更新重点

            - 优化原生托盘控制浮层与空闲预警浮层，适配深浅色、DPI、多语言和多显示器定位。
            - 空闲监测会在启动、用户活动、取消预警和动作执行后安全重置计时。
            - 空闲动作预警支持取消，并在调试日志中增加启动会话标识。
            - 完善配置注释迁移、托盘状态文案、CLI 一致性及中英文文档。

            下载原生 64 位版本 `IdleTrigger-x64.exe`（推荐），或下载 32 位兼容版本
            `IdleTrigger-x86.exe`。无需安装，直接运行即可。

            完整说明见 [README.zh-CN.md](https://github.com/JeffioZ/idletrigger/blob/master/README.zh-CN.md)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
