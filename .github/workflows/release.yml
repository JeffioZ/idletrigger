name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Verify
        run: |
          go mod download
          go test ./...
          go vet ./...

      - name: Generate .syso
        run: |
          go run ./scripts/gen_resource.go -version ${{ github.ref_name }}

      - name: Build
        run: |
          $env:CGO_ENABLED = "0"
          $ldflags = "-s -w -H windowsgui -X github.com/JeffioZ/idletrigger/internal/version.Value=${{ github.ref_name }}"
          $env:GOARCH = "386"
          go build -trimpath -ldflags "$ldflags" -o IdleTrigger-x86.exe .
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "$ldflags" -o IdleTrigger-x64.exe .

      - name: Checksums
        run: |
          $lines = @()
          foreach ($file in @("IdleTrigger-x86.exe", "IdleTrigger-x64.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            $lines += "$hash *$file"
          }
          Set-Content -Encoding ascii SHA256SUMS.txt $lines

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            IdleTrigger-x86.exe
            IdleTrigger-x64.exe
            SHA256SUMS.txt
          body: |
            ## English

            ### Highlights

            - Added a Debug Log toggle to the tray control panel.
            - Added inline tooltips for control-panel actions, including hints for advanced TOML settings.
            - Removed the About dialog and now shows the app version directly in the control panel.
            - Improved tray tooltip formatting and status coverage.
            - Updated English and Simplified Chinese documentation to match the current UI.

            Download the native 64-bit build `IdleTrigger-x64.exe` (recommended) or
            the 32-bit compatibility build `IdleTrigger-x86.exe` — no installation needed.

            See [README.md](https://github.com/JeffioZ/idletrigger/blob/master/README.md) for full documentation.

            ## 中文

            ### 更新重点

            - 托盘控制面板新增“调试日志”开关。
            - 控制面板各功能入口新增 tooltip，说明功能作用和高级 TOML 配置位置。
            - 移除“关于”弹窗，改为在控制面板内直接展示应用版本号。
            - 优化托盘 tooltip 的格式和状态覆盖范围。
            - 更新英文和简体中文文档，使其与当前界面保持一致。

            下载原生 64 位版本 `IdleTrigger-x64.exe`（推荐），或下载 32 位兼容版本
            `IdleTrigger-x86.exe`。无需安装，直接运行即可。

            完整说明见 [README.zh-CN.md](https://github.com/JeffioZ/idletrigger/blob/master/README.zh-CN.md)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
