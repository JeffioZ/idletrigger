name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'

      - name: Verify
        run: |
          go mod download
          go mod verify
          $unfmt = (gofmt -l .)
          if ($unfmt) { Write-Error "gofmt: $unfmt"; exit 1 }
          go test -count=1 ./...
          go vet ./...

      - name: Generate .syso
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          go run ./scripts/gen_resource.go -version $version

      - name: Build
        run: |
          $env:CGO_ENABLED = "0"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $ldflags = "-s -w -H windowsgui -X github.com/JeffioZ/idletrigger/internal/version.Value=$version"
          $env:GOARCH = "386"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x86.exe .
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "$ldflags" -o dist/IdleTrigger-x64.exe .

      - name: Checksums
        run: |
          $lines = @()
          foreach ($file in @("dist/IdleTrigger-x86.exe", "dist/IdleTrigger-x64.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            $lines += "$hash *$([System.IO.Path]::GetFileName($file))"
          }
          Set-Content -Encoding ascii SHA256SUMS.txt $lines

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          fail_on_unmatched_files: true
          files: |
            dist/IdleTrigger-x86.exe
            dist/IdleTrigger-x64.exe
            SHA256SUMS.txt
          body: |
            ## English

            ### Highlights

            - Redesigned the Windows application and tray icon assets with refreshed light/dark variants.
            - Added a repository social preview image and documented the icon generation workflow.
            - Reduced background overhead by polling battery state only when Stay Awake or theme rules need it.
            - Kept the native single-EXE distribution model and regenerated Windows version resources for this release.

            Download the native 64-bit build `IdleTrigger-x64.exe` (recommended) or
            the 32-bit compatibility build `IdleTrigger-x86.exe` — no installation needed.

            See [README.md](https://github.com/JeffioZ/idletrigger/blob/master/README.md) for full documentation.

            ## 中文

            ### 更新重点

            - 重新设计 Windows 应用图标和托盘图标，并刷新深浅色托盘变体。
            - 新增仓库社交预览图，并补充图标生成流程说明。
            - 仅在保持唤醒或主题规则需要时轮询电池状态，降低后台开销。
            - 保持单 EXE 原生分发方式，并为本次发布重新生成 Windows 版本资源。

            下载原生 64 位版本 `IdleTrigger-x64.exe`（推荐），或下载 32 位兼容版本
            `IdleTrigger-x86.exe`。无需安装，直接运行即可。

            完整说明见 [README.zh-CN.md](https://github.com/JeffioZ/idletrigger/blob/master/README.zh-CN.md)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
