# IdleTrigger 配置示例 / Configuration Example
# 复制为 IdleTrigger.toml 放在 EXE 同目录即可生效
# Copy to IdleTrigger.toml next to the EXE to apply
# config_template_version = 8

# -- 保持唤醒 / Stay Awake --
# 手动启用保持唤醒，阻止系统自动睡眠 / Manually keep the system awake and prevent automatic sleep
nosleep_enabled = false
# 保持唤醒时同步保持屏幕常亮 / Keep the display on while Stay Awake is active
keep_screen_on = false
# 电池供电时仍允许保持唤醒 / Allow Stay Awake while running on battery
nosleep_on_battery = false
# 电池电量低于此百分比时强制关闭保持唤醒 / Force-disable Stay Awake below this battery percentage
nosleep_battery_threshold = 20
# 保持唤醒已开启时，仅在下方任一 exe 运行时保活；没有匹配进程时不保活，也不会单独启用保持唤醒 / When Stay Awake is enabled, keep awake only while any listed exe is running; no match means no keep-awake request, and this does not enable Stay Awake by itself
process_watch_enabled = false
# 适用进程的 .exe 文件名，不区分大小写；空列表是正常状态，表示不按进程限制保持唤醒，也不影响空闲监测 / Applicable .exe names, case-insensitive; an empty list is valid, means Stay Awake is not process-limited, and does not affect idle monitoring
process_watch_list = []

# -- 空闲监测 / Idle Monitor --
# 空闲时长：无键鼠操作多少分钟后触发动作，设为 0 禁用 / Idle time in minutes before triggering after no keyboard or mouse input, 0 = disabled
idle_timeout_minutes = 30
# 达到空闲时长后执行的动作 / Action to run after the idle time is reached: "sleep", "hibernate", "shutdown", "lock"
idle_action = "sleep"
# 触发前多少秒显示不抢焦点的应用内提醒；键鼠操作或关闭提醒会取消本次动作，设为 0 静默执行 / Seconds before trigger to show a non-activating in-app reminder; keyboard/mouse input or closing it cancels this action, 0 = silent
idle_warning_seconds = 30
# 增强空闲监测：适合系统睡眠也被固定间隔空闲刷新干扰的机器；默认关闭，普通键鼠操作仍会重置计时 / Enhanced idle monitoring for machines where system sleep is disturbed by fixed-interval idle refreshes; off by default, and normal keyboard or mouse input still resets idle time
idle_enhanced_monitor = false

# -- 昼夜主题 / Day/Night Theme --
# 启用按时间自动切换 Windows 深浅色 / Automatically switch Windows light/dark theme by schedule
theme_switch_enabled = false
# 切换模式："fixed" 使用下方固定时间；"sunrise" 根据日出日落计算 / Mode: "fixed" uses times below; "sunrise" calculates sunrise/sunset
theme_mode = "sunrise"
# 浅色开始时间，HH:MM；fixed 模式使用，日出日落不可用时也作为兜底 / Light theme start time, HH:MM; used by fixed mode and as fallback when sunrise/sunset is unavailable
theme_light_time = "07:00"
# 深色开始时间，HH:MM；fixed 模式使用，日出日落不可用时也作为兜底 / Dark theme start time, HH:MM; used by fixed mode and as fallback when sunrise/sunset is unavailable
theme_dark_time = "19:00"
# 日出日落计算纬度，范围 -90 到 90；经纬度都为 0 时优先看下方 IP 定位开关，未开启或失败则按时区、UTC 偏移和默认位置依次回退 / Latitude for sunrise mode, -90..90; when both lat/lon are 0, the IP location option below is used first; otherwise falls back to timezone, UTC offset, then default location
theme_latitude = 0
# 日出日落计算经度，范围 -180 到 180；经纬度都为 0 时优先看下方 IP 定位开关，未开启或失败则按时区、UTC 偏移和默认位置依次回退 / Longitude for sunrise mode, -180..180; when both lat/lon are 0, the IP location option below is used first; otherwise falls back to timezone, UTC offset, then default location
theme_longitude = 0
# 经纬度都为 0 时，通过 https://ipwho.is/ 估算公网 IP 所在城市；成功结果仅内存缓存 24 小时，每次启动或手动重新开启定位时，首次失败后会在 30 分钟后补试一次；关闭或失败时按时区、UTC 偏移和默认位置依次回退 / When coordinates are 0, estimate city via https://ipwho.is/; successful results are cached in memory for 24 hours, and one retry is made 30 minutes after the first failure on app start or explicit re-enable; falls back to timezone, UTC offset, then default location when off or failed
theme_ip_location_enabled = false
# 电池供电时自动切换深色，接入电源后按当前计划恢复 / Switch to dark on battery, then restore by schedule on AC power
theme_dark_on_battery = true
# 全屏应用或游戏运行时暂不自动切换主题 / Pause automatic theme switching during fullscreen apps/games
theme_skip_fullscreen = true

# -- 设置 / Settings --
# 启用全局热键：Win+Shift+S 睡眠，Win+Shift+L 锁定，Win+Shift+N 切换保持唤醒 / Enable global hotkeys: Win+Shift+S sleep, Win+Shift+L lock, Win+Shift+N toggle Stay Awake
hotkeys_enabled = false
# 将调试日志写入 EXE 同目录的 IdleTrigger.log；每行带启动会话标识 / Write debug logs to IdleTrigger.log next to the EXE; each line includes a startup session ID
logging_enabled = false
# 界面语言："auto" 跟随系统，"en" 英文，"zh-CN" 简体中文 / UI language: "auto" follows OS, "en" English, "zh-CN" Simplified Chinese
language = "auto"
